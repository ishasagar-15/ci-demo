name: ci pipelin

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4
      
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: dependancy check
        run: npm install

      - name: run test
        run: npm test
        env:
          MESSAGE: HELLO FROM CI

      - name: build docker image 
        run: docker build -t ci-demo .

