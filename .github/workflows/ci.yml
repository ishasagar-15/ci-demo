name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:

  # ------------------ 1️⃣ TEST ------------------
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test
        env:
          MESSAGE: HELLO FROM CI


  # ------------------ 2️⃣ BUILD ------------------
  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Optional: Just to validate Docker build
      - name: Build Docker Image (Check)
        run: docker build -t ci-demo .


  # ------------------ 3️⃣ DEPLOY ------------------
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🔐 Login (Best Practice)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🔥 Build + Tag + Push in ONE step (BEST PRACTICE)
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ci-demo:${{ github.sha }}
